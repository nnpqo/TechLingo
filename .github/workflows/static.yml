name: Deploy React Vite Site

on:
  push:
    branches: ["main"] # Cambia a "master" si tu rama principal se llama así

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Debug - Check if secrets are available
        run: |
          echo "Checking secrets..."
          [ -z "${{ secrets.VITE_FIREBASE_API_KEY }}" ] && echo "❌ VITE_FIREBASE_API_KEY is EMPTY" || echo "✅ VITE_FIREBASE_API_KEY is set"
          [ -z "${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" ] && echo "❌ VITE_FIREBASE_AUTH_DOMAIN is EMPTY" || echo "✅ VITE_FIREBASE_AUTH_DOMAIN is set"
          [ -z "${{ secrets.VITE_FIREBASE_PROJECT_ID }}" ] && echo "❌ VITE_FIREBASE_PROJECT_ID is EMPTY" || echo "✅ VITE_FIREBASE_PROJECT_ID is set"
          [ -z "${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" ] && echo "❌ VITE_FIREBASE_STORAGE_BUCKET is EMPTY" || echo "✅ VITE_FIREBASE_STORAGE_BUCKET is set"
          [ -z "${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" ] && echo "❌ VITE_FIREBASE_MESSAGING_SENDER_ID is EMPTY" || echo "✅ VITE_FIREBASE_MESSAGING_SENDER_ID is set"
          [ -z "${{ secrets.VITE_FIREBASE_APP_ID }}" ] && echo "❌ VITE_FIREBASE_APP_ID is EMPTY" || echo "✅ VITE_FIREBASE_APP_ID is set"
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build Project
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Vite compila todo dentro de la carpeta /dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
